##############################################################################
# LMS — Docker Compose for Dokploy (Unified Next.js Frontend)
#
# KEY DIFFERENCES:
#   • No nginx proxy / certbot — Dokploy's Traefik handles routing + SSL
#   • All public services join "dokploy-network" so Traefik can reach them
#   • Domains are configured in the Dokploy UI (Domains tab), NOT hardcoded
#
# SETUP IN DOKPLOY UI:
#   1. Create a new "Docker Compose" project
#   2. Connect your Git repo, set compose file to: docker-compose.dokploy.yml
#   3. Go to "Environment" tab → paste the filled-in contents of .env.docker.example
#   4. Deploy
#   5. Go to "Domains" tab → add your domains:
#       backend    → api.clientdomain.com             (port 5000)
#       web-app    → clientdomain.com (or app.*)      (port 3000)
##############################################################################

services:

  # ─── Database (internal only) ─────────────────────────────────────────────
  # Volume db_data persists all MySQL data across redeploys — never deleted
  db:
    image: mysql:8.0
    container_name: lms_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - lms_internal

  # ─── Backend API ───────────────────────────────────────────────────────────
  # Domain in Dokploy UI: api.edunura.com → port 5000
  # Volume uploads_data persists course videos, thumbnails, avatars across redeploys
  backend:
    image: harshath/lms-backend:latest
    container_name: lms_backend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${PORT}

      # Admin seed credentials (only used on first boot if no admin exists)
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}

      # Database
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}

      # JWT
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN}

      # Jitsi Live Classes
      JITSI_DOMAIN: ${JITSI_DOMAIN}
      JITSI_APP_ID: ${JITSI_APP_ID}
      JITSI_APP_SECRET: ${JITSI_APP_SECRET}

      # Backend public URL — used in Jitsi dynamic branding endpoint to build logo URLs
      BACKEND_URL: ${BACKEND_URL}

      # Email (SendGrid)
      EMAIL_SERVICE: ${EMAIL_SERVICE}
      EMAIL_FROM: ${EMAIL_FROM}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}

      # CORS — allow only the production frontend
      FRONTEND_URL: ${FRONTEND_URL}

      # File Upload limits
      MAX_FILE_SIZE: ${MAX_FILE_SIZE}
      ALLOWED_FILE_TYPES: ${ALLOWED_FILE_TYPES}

      # AWS S3 (optional — for future file storage migration)
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Named volume — survives container replacement, image updates, redeploys
      - uploads_data:/app/uploads
    expose:
      - "5000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - lms_internal
      - dokploy-network

  # ─── Unified Frontend (Next.js 16 — all 4 portals consolidated) ───────────
  # Domain in Dokploy UI: edunura.com (or app.edunura.com) → port 3000
  # Portals: /admin /teacher /student /landing /meeting /checkout /course
  web-app:
    image: harshath/lms-web:latest
    container_name: lms_web
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "node", "-e", "const net=require('net');const s=net.connect(3000,'127.0.0.1',()=>{s.destroy();process.exit(0)});s.on('error',()=>process.exit(1));setTimeout(()=>process.exit(1),5000)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - dokploy-network

# ─── Volumes ───────────────────────────────────────────────────────────────
# Named volumes are managed by Docker — NOT deleted on redeploy or image update.
# Only deleted explicitly with: docker volume rm <name>
volumes:
  db_data:       # MySQL data files — all course, user, payment records
    driver: local
  uploads_data:  # Uploaded files — course videos, thumbnails, avatars, PDFs
    driver: local

# ─── Networks ──────────────────────────────────────────────────────────────
networks:
  # Internal network — db is never exposed to the internet
  lms_internal:
    driver: bridge

  # Dokploy's Traefik reverse-proxy network — required for domain routing
  dokploy-network:
    external: true
