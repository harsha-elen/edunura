##############################################################################
# Jitsi Meet + Recording (Jibri) + Whiteboard (Excalidraw) - Docker Compose
#
# Components:
#   - Jitsi Web (Frontend) — includes built-in Excalidraw whiteboard
#   - Jitsi Prosody (XMPP signaling)
#   - Jitsi Jicofo (Conference focus)
#   - Jitsi JVB (Video bridge)
#   - Jibri (Recording service)
#   - Redis (Caching for Prosody)
#
# Deploy in Dokploy:
#   1. Create new Docker Compose service
#   2. Paste this file
#   3. Set environment variables (see bottom)
#   4. Add domain via Dokploy UI
#   5. Deploy
#
##############################################################################

version: '3.8'

services:

  # ─── Redis (Caching for Prosody) ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: jitsi_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - jitsi_internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Jitsi Prosody (XMPP Server) ──────────────────────────────────────────
  prosody:
    image: jitsi/prosody:stable
    container_name: jitsi_prosody
    restart: unless-stopped
    environment:
      XMPP_DOMAIN: ${JITSI_XMPP_DOMAIN:-meet.jitsi}
      XMPP_AUTH_DOMAIN: auth.${JITSI_XMPP_DOMAIN:-meet.jitsi}
      XMPP_INTERNAL_MUC_DOMAIN: internal-muc.${JITSI_XMPP_DOMAIN:-meet.jitsi}
      XMPP_MUC_DOMAIN: muc.${JITSI_XMPP_DOMAIN:-meet.jitsi}
      XMPP_GUEST_DOMAIN: guest.${JITSI_XMPP_DOMAIN:-meet.jitsi}
      ENABLE_AUTH: '1'
      ENABLE_GUESTS: '1'
      AUTH_TYPE: jwt
      JWT_APP_ID: ${JITSI_APP_ID:-edunura_lms}
      JWT_APP_SECRET: ${JITSI_APP_SECRET:-changeme_use_strong_secret}
      JWT_ALLOW_EMPTY: '0'
      JWT_AUTH_TYPE: token
      JWT_TOKEN_AUTH_MODULE: token_verification
      # Strict JWT validation: iss and aud must match APP_ID
      JWT_ACCEPTED_ISSUERS: '${JITSI_APP_ID:-edunura_lms}'
      JWT_ACCEPTED_AUDIENCES: '${JITSI_APP_ID:-edunura_lms}'
      JICOFO_AUTH_USER: focus
      JICOFO_AUTH_PASSWORD: ${JICOFO_AUTH_PASSWORD:-focusauthpass}
      JIBRI_XMPP_USER: ${JIBRI_XMPP_USER:-jibri}
      JIBRI_XMPP_PASSWORD: ${JIBRI_XMPP_PASSWORD:-jibriauthpass}
      JIBRI_RECORDER_USER: ${JIBRI_RECORDER_USER:-recorder}
      JIBRI_RECORDER_PASSWORD: ${JIBRI_RECORDER_PASSWORD:-recorderpass}
      JICOFO_COMPONENT_SECRET: ${JICOFO_COMPONENT_SECRET:-jicofoauthsecret}
      JVB_AUTH_USER: ${JVB_AUTH_USER:-jvb}
      JVB_AUTH_PASSWORD: ${JVB_AUTH_PASSWORD:-jvbauthpass}
      PUBLIC_URL: 'https://${JITSI_DOMAIN}'
      TZ: ${JITSI_TZ:-UTC}
      LOG_LEVEL: ${JITSI_LOG_LEVEL:-info}
      # Prevent idle disconnects - default c2s timeout is 300s (5 min)
      # Setting to 0 disables the idle timeout entirely
      PROSODY_C2S_IDLE_TIMEOUT: '0'
      # Increase BOSH timeout to prevent 2-5 min reconnects
      PROSODY_BOSH_MAX_INACTIVITY: '120'
      # Enable WebSocket support (more stable than BOSH for long sessions)
      WEBSOCKET_DOMAINS: '${JITSI_XMPP_DOMAIN:-meet.jitsi}'
    volumes:
      - prosody_plugins_custom:/prosody-plugins-custom
      - prosody_config:/etc/prosody
    networks:
      - jitsi_internal
    depends_on:
      - redis

  # ─── Jitsi Jicofo (Conference Focus) ──────────────────────────────────────
  jicofo:
    image: jitsi/jicofo:stable
    container_name: jitsi_jicofo
    restart: unless-stopped
    environment:
      XMPP_SERVER: prosody
      XMPP_DOMAIN: ${JITSI_XMPP_DOMAIN:-meet.jitsi}
      XMPP_AUTH_DOMAIN: auth.${JITSI_XMPP_DOMAIN:-meet.jitsi}
      XMPP_INTERNAL_MUC_DOMAIN: internal-muc.${JITSI_XMPP_DOMAIN:-meet.jitsi}
      JICOFO_COMPONENT_SECRET: ${JICOFO_COMPONENT_SECRET:-jicofoauthsecret}
      JICOFO_AUTH_USER: focus
      JICOFO_AUTH_PASSWORD: ${JICOFO_AUTH_PASSWORD:-focusauthpass}
      JIBRI_BREWERY_MUC: JibriBrewery
      JWT_APP_ID: ${JITSI_APP_ID:-edunura_lms}
      JWT_APP_SECRET: ${JITSI_APP_SECRET:-changeme_use_strong_secret}
      # Disable auto-owner: only JWT moderator=true users get moderator role
      JICOFO_ENABLE_REST: 'true'
      JICOFO_AUTH_LIFETIME: '24 hours'
      LOG_LEVEL: ${JITSI_LOG_LEVEL:-info}
      ENABLE_RECORDING: 'true'
      TZ: ${JITSI_TZ:-UTC}
    networks:
      - jitsi_internal
    depends_on:
      - prosody

  # ─── Jitsi JVB (Video Bridge) ─────────────────────────────────────────────
  jvb:
    image: jitsi/jvb:stable
    container_name: jitsi_jvb
    restart: unless-stopped
    ports:
      - "${JVB_PORT:-10000}:10000/udp"
    environment:
      XMPP_AUTH_DOMAIN: auth.${JITSI_XMPP_DOMAIN:-meet.jitsi}
      XMPP_INTERNAL_MUC_DOMAIN: internal-muc.${JITSI_XMPP_DOMAIN:-meet.jitsi}
      XMPP_SERVER: prosody
      JVB_AUTH_USER: ${JVB_AUTH_USER:-jvb}
      JVB_AUTH_PASSWORD: ${JVB_AUTH_PASSWORD:-jvbauthpass}
      JVB_PORT: 10000
      JVB_TCP_HARVESTER_DISABLED: 'true'
      JVB_ENABLE_APIS: 'rest,xmpp'
      LOG_LEVEL: ${JITSI_LOG_LEVEL:-info}
      DOCKER_HOST_ADDRESS: ${JVB_PUBLIC_IP}
      TZ: ${JITSI_TZ:-UTC}
    networks:
      - jitsi_internal
    depends_on:
      - prosody
      - jicofo
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/about/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Jibri (Recording Service) ────────────────────────────────────────────
  jibri:
    image: jitsi/jibri:stable
    container_name: jitsi_jibri
    restart: unless-stopped
    cap_add:
      - SYS_ADMIN
      - NET_BIND_SERVICE
    # Required: run `modprobe snd-aloop` on the VPS host first,
    # then /dev/snd will exist for virtual audio capture
    devices:
      - /dev/snd:/dev/snd
    security_opt:
      - seccomp=unconfined  # Chrome sandbox requires this
    environment:
      XMPP_SERVER: prosody
      XMPP_DOMAIN: ${JITSI_XMPP_DOMAIN:-meet.jitsi}
      XMPP_AUTH_DOMAIN: auth.${JITSI_XMPP_DOMAIN:-meet.jitsi}
      XMPP_INTERNAL_MUC_DOMAIN: internal-muc.${JITSI_XMPP_DOMAIN:-meet.jitsi}
      XMPP_MUC_DOMAIN: muc.${JITSI_XMPP_DOMAIN:-meet.jitsi}
      XMPP_USERNAME: ${JIBRI_XMPP_USER:-jibri}
      XMPP_PASSWORD: ${JIBRI_XMPP_PASSWORD:-jibriauthpass}
      JIBRI_BREWERY_MUC: JibriBrewery
      JIBRI_RECORDER_USER: ${JIBRI_RECORDER_USER:-recorder}
      JIBRI_RECORDER_PASSWORD: ${JIBRI_RECORDER_PASSWORD:-recorderpass}
      JIBRI_STRIP_DOMAIN_JID: 'muc'
      JIBRI_RECORDING_RESOLUTION: '1280x720'
      JIBRI_USAGE_TIMEOUT: '0'
      # JWT auth so Jibri can join as recorder
      AUTH_TYPE: jwt
      JWT_APP_ID: ${JITSI_APP_ID:-edunura_lms}
      JWT_APP_SECRET: ${JITSI_APP_SECRET:-changeme_use_strong_secret}
      ENABLE_RECORDING: '1'
      RECORDING_DIR: /recordings
      LOG_LEVEL: ${JITSI_LOG_LEVEL:-info}
      TZ: ${JITSI_TZ:-UTC}
    volumes:
      - jibri_recordings:/recordings
      - jibri_tmp:/tmp
      - jibri_config:/home/jibri/.local/share/jitsi-meet-electron
    networks:
      - jitsi_internal
    depends_on:
      - prosody
      - jicofo
      - jvb
    shm_size: 2gb
    stdin_open: true
    tty: true

  # ─── Jitsi Web (Frontend) ─────────────────────────────────────────────────
  web:
    image: jitsi/web:stable
    container_name: jitsi_web
    restart: unless-stopped
    environment:
      XMPP_DOMAIN: ${JITSI_XMPP_DOMAIN:-meet.jitsi}
      XMPP_AUTH_DOMAIN: auth.${JITSI_XMPP_DOMAIN:-meet.jitsi}
      XMPP_INTERNAL_MUC_DOMAIN: internal-muc.${JITSI_XMPP_DOMAIN:-meet.jitsi}
      XMPP_MUC_DOMAIN: muc.${JITSI_XMPP_DOMAIN:-meet.jitsi}
      XMPP_GUEST_DOMAIN: guest.${JITSI_XMPP_DOMAIN:-meet.jitsi}
      XMPP_BOSH_URL_BASE: 'http://prosody:5280'
      # Enable WebSocket transport (more stable, avoids BOSH idle timeout disconnects)
      ENABLE_WEBSOCKET: '1'
      WEBSOCKET_URL: wss://${JITSI_DOMAIN}/xmpp-websocket
      WEBSOCKET_KEEPALIVE_URL: https://${JITSI_DOMAIN}/http-bind
      ENABLE_AUTH: '1'
      ENABLE_GUESTS: '1'
      TOKEN_AUTH_URL: https://${JITSI_DOMAIN}/
      JWT_APP_ID: ${JITSI_APP_ID:-edunura_lms}
      JWT_APP_SECRET: ${JITSI_APP_SECRET:-changeme_use_strong_secret}
      LOG_LEVEL: ${JITSI_LOG_LEVEL:-info}
      PUBLIC_URL: https://${JITSI_DOMAIN}
      ENABLE_RECORDING: 'true'
      # Excalidraw whiteboard is built into jitsi/web:stable — no extra service needed
      CALLSTATS_ENABLED: 'false'
      ANALYTICS_SCRIPT_URLS: ''
      ANALYTICS_WHITELISTED_EVENTS: ''
      DEPLOYMENTINFO_ENVIRONMENT: production
      DEPLOYMENTINFO_SENTRY_DSN: ''
      DEPLOY_WELCOME_PAGE: 'false'
      SHOW_BRAND_WATERMARK: 'true'
      SHOW_JITSI_WATERMARK: 'false'
      SHOW_POWEREDBY: 'true'
      # Security
      DISABLE_AUDIO_LEVELS: 'false'
      ENABLE_LIPSYNC: 'false'
      ENABLE_SIMULCAST: 'false'
      START_AUDIO_MUTED: '0'
      START_VIDEO_MUTED: '0'
      START_WITH_AUDIO_MUTED: 'false'
      LOGLEVEL: ${JITSI_LOG_LEVEL:-info}
    expose:
      - "80"
    volumes:
      - web_config:/etc/jitsi/web
    networks:
      - jitsi_public
      - jitsi_internal
      - dokploy-network
    depends_on:
      - prosody
      - jicofo
      - jvb
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

# ─── Networks ──────────────────────────────────────────────────────────────
networks:
  jitsi_public:
    driver: bridge
  jitsi_internal:
    driver: bridge
    internal: true
  dokploy-network:
    external: true

# ─── Volumes ──────────────────────────────────────────────────────────────
volumes:
  redis_data:
    driver: local
  prosody_plugins_custom:
    driver: local
  prosody_config:
    driver: local
  jibri_recordings:
    driver: local
  jibri_tmp:
    driver: local
  jibri_config:
    driver: local
  web_config:
    driver: local
